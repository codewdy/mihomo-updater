services:
  mihomo-updater:
    image: ${MIHOMO_UPDATER_IMAGE:-ghcr.io/codewdy/mihomo-updater:latest}
    user: "${HOST_UID}:${HOST_GID}"
    env_file: .env
    ports:
      - "${HOST_PORT:-7890}:7890"
      - "${HOST_API_PORT:-9090}:9090"
    volumes:
      - type: bind
        source: ${DATA_PATH:-./data}
        target: /app/data
        bind:
          create_host_path: false
    restart: unless-stopped
